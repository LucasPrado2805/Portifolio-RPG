<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>RPG - Mapa Hexagonal</title>
    <link rel="stylesheet" href="rpg.css">
</head>
<body>
    <h1>Mapa do RPG</h1>
    <div id="mapa"></div>

    <div id="hud">
        <div id="foto-personagem"></div>

    <div id="painel-combate" style="display:none;">
        <h2 id="combate-nome"></h2>
        <p id="combate-vida"></p>
        <button onclick="atacar()">⚔️ Atacar</button>
    </div>

        <div id="doca">
            <div id="status">
                <div class="stat" id="nome">Herói</div>
                <div class="stat" id="vida">Vida: —</div>
                <div class="stat" id="dinheiro">Ouro: —</div>
                <div class="stat" id="nivel">Nível: —</div>
                <div class="stat" id="saldo">Movimento: —</div>
                <div class="stat" id="turno">Turno: —</div>
            </div>

            <div id="doca-baixo">
                <div id="menu">
                    <button class="btn-menu">Inventário</button>
                    <button class="btn-menu">Diário</button>
                </div>

               <div id="controles-mov">
                    <button class="hexbtn" onclick="mover('noroeste')">NO</button>
                    <span></span>
                    <button class="hexbtn" onclick="mover('nordeste')">NE</button>

                    <button class="hexbtn" onclick="mover('oeste')">O</button>
                    <button class="hexbtn hex-acampar" onclick="acampar()">⛺</button>
                    <button class="hexbtn" onclick="mover('leste')">L</button>

                    <button class="hexbtn" onclick="mover('sudoeste')">SO</button>
                    <span></span>
                    <button class="hexbtn" onclick="mover('sudeste')">SE</button>
                </div>

                <button id="btn-turno" onclick="encerrar()">Encerrar turno</button>
            </div>
        </div>
    </div>

    <script>

       async function atacar() {
            const r = await fetch('http://localhost:3000/atacar').then(r => r.json());

            if (r.erro) { alert(r.erro); return; }

            desenhar(); // atualiza a vida do herói na doca

            if (r.fim === 'vitoria') {
                alert('🎲 ' + r.d20 + '! Você derrotou ' + r.nome + '!');
                document.getElementById('painel-combate').style.display = 'none';
                return;
            }
            if (r.fim === 'derrota') {
                alert('🎲 ' + r.d20 + '... Você foi derrotado!');
                document.getElementById('painel-combate').style.display = 'none';
                return;
            }

            // luta continua: atualiza os números no painel
            document.getElementById('combate-vida').textContent =
                'Vida: ' + r.vidaMonstro + ' | (tirou ' + r.d20 + ' no d20)';
        }

        async function desenhar() {
            const posicoes = await fetch('http://localhost:3000/posicoes').then(r => r.json());
            const heroi = await fetch('http://localhost:3000/personagem').then(r => r.json());
            const cidades = await fetch('http://localhost:3000/cidades').then(r => r.json());

            document.getElementById('saldo').textContent =
                'Movimento: ' + heroi.saldo_mov_turno + ' / ' + heroi.movimento_max;
            document.getElementById('turno').textContent =
                'Turno: ' + heroi.turno_atual;
            document.getElementById('vida').textContent =
                'Vida: ' + heroi.vida + ' / ' + heroi.vida_max;
                
            const mapa = document.getElementById('mapa');
            mapa.innerHTML = '';

            const ys = posicoes.map(p => p.y);
            const minY = Math.min(...ys), maxY = Math.max(...ys);

            for (let y = minY; y <= maxY; y++) {
                const linha = document.createElement('div');
                linha.className = 'linha';
                linha.style.marginLeft = (y * 26) + 'px';

                const casasDaLinha = posicoes
                    .filter(p => p.y === y)
                    .sort((a, b) => a.x - b.x);

                for (const pos of casasDaLinha) {
                    const hex = document.createElement('div');
                    hex.className = 'hex';

                    const cidadeAqui = cidades.find(c => c.x === pos.x && c.y === pos.y);

                    if (pos.x === heroi.x && pos.y === heroi.y) {
                        hex.className = 'hex heroi';
                        hex.textContent = '🧙';
                    } else if (cidadeAqui) {
                        hex.className = 'hex cidade';
                        hex.textContent = '🏰';
                    } else {
                        hex.textContent = pos.x + ',' + pos.y;
                    }
                    hex.style.background = pos.cor;
                    linha.appendChild(hex);
                }
                mapa.appendChild(linha);
            }
        }

        async function mover(direcao) {
            await fetch('http://localhost:3000/mover/' + direcao);
            desenhar();
        }

        async function encerrar() {
            const r = await fetch('http://localhost:3000/encerrar').then(r => r.json());
            if (!r.ok) {
                alert('Não dá pra encerrar: ' + r.motivo);
                return;
            }
            
            desenhar();

            if (r.encontro) {
                if (r.encontro.vazia) {
                    alert('Nada aconteceu: ' + r.encontro.nome);
                } else if (r.encontro.protegido) {
                    alert(r.encontro.nome + ' rondou o acampamento, mas não atacou.');
                } else {
                    document.getElementById('combate-nome').textContent = r.encontro.nome;
                    document.getElementById('combate-vida').textContent =
                        'Vida: ' + r.encontro.vidaMonstro + ' | Ataque: ' + r.encontro.ataqueMonstro;
                    document.getElementById('painel-combate').style.display = 'block';
                }
            }
        }

        async function acampar() {
            const r = await fetch('http://localhost:3000/acampar').then(r => r.json());
            if (!r.ok) {
                alert('Não dá pra acampar: ' + r.motivo);
                return;
            }
            desenhar();
            alert('⛺ Acampamento montado! Passe o turno para se curar.');
        }
        desenhar();

    </script>
</body>
</html>
